    sdk: flutter
  comon_logger: ^0.1.0
  devtools_app_shared: ^0.3.0
  devtools_extensions: ^0.3.0
  vm_service: ^14.0.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^4.0.0

flutter:
  uses-material-design: true
